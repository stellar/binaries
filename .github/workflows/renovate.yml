name: Renovate

on:
  schedule:
  - cron: '0 6 * * *' # daily, 06:00 UTC
  workflow_dispatch:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:

  renovate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      statuses: write
      checks: read
    steps:
    - uses: actions/checkout@v7
    - uses: renovatebot/github-action@6d859fc95779be83a0335ca704879b47e5d79641 #v46.1.16
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        configurationFile: renovate.json5
      env:
        RENOVATE_REPOSITORIES: ${{ github.repository }}
        RENOVATE_BASE_BRANCH_PATTERNS: '["${{ github.head_ref || github.ref_name }}"]'
        RENOVATE_REQUIRE_CONFIG: optional
        RENOVATE_ONBOARDING: 'false'
        RENOVATE_DRY_RUN: ${{ github.event_name == 'pull_request' && 'full' || '' }}
        LOG_LEVEL: ${{ github.event_name == 'pull_request' && 'debug' || 'info' }}
