name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:

  complete:
    if: always()
    needs: [prepare, cargo, go]
    runs-on: ubuntu-latest
    steps:
    - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
      run: exit 1

  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      cargo: ${{ steps.matrix.outputs.cargo }}
      go: ${{ steps.matrix.outputs.go }}
    steps:
    - uses: actions/checkout@v5
    - id: matrix
      run: |
        echo "cargo=$(jq -c '.' tools-cargo.json)" >> "$GITHUB_OUTPUT"
        echo "go=$(jq -c '.' tools-go.json)" >> "$GITHUB_OUTPUT"

  cargo:
    needs: prepare
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        crate: ${{ fromJSON(needs.prepare.outputs.cargo) }}
        runs-on:
        - ubuntu-latest # amd64
        - ubuntu-22.04-arm # arm64
        - macos-15-intel # amd64
        - macos-latest # arm64
        - windows-latest # amd64
    runs-on: ${{ matrix.runs-on }}
    defaults:
      run:
        shell: bash
    steps:
    - run: echo "ASSET_NAME=${{ matrix.crate.name }}-${{ matrix.crate.version }}-${{ runner.os }}-${{ runner.arch }}.tar.gz" >> $GITHUB_ENV
    - name: Check for existing artifact
      id: check
      run: |
        TAG=$(gh release list -R ${{ github.repository }} --limit 1 --json tagName | jq -r '.[0].tagName')
        if gh release download -R ${{ github.repository }} $TAG --pattern "$ASSET_NAME"; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - if: steps.check.outputs.exists == 'false' && matrix.crate.rust
      run: |
        rustup install ${{ matrix.crate.rust }}
        rustup default ${{ matrix.crate.rust }}
    - if: steps.check.outputs.exists == 'false' && !matrix.crate.rust
      run: |
        rustup update
        rustc -V
    - if: steps.check.outputs.exists == 'false'
      uses: stellar/actions/rust-cache@main
    - if: steps.check.outputs.exists == 'false'
      run: cargo install --target-dir ~/.cargo/target --root . --locked --version ${{ matrix.crate.version }} ${{ matrix.crate.name }}
    - if: steps.check.outputs.exists == 'false'
      run: tar cvfz $ASSET_NAME -C bin .
    - uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.crate.name }}-${{ matrix.crate.version }}-${{ matrix.runs-on }}
        path: '*.tar.gz'

  go:
    needs: prepare
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.prepare.outputs.go) }}
        runs-on:
        - ubuntu-latest # amd64
        - ubuntu-22.04-arm # arm64
        - macos-15-intel # amd64
        - macos-latest # arm64
        - windows-latest # amd64
    runs-on: ${{ matrix.runs-on }}
    defaults:
      run:
        shell: bash
    steps:
    - run: echo "ASSET_NAME=${{ matrix.package.name }}-${{ matrix.package.version }}-${{ runner.os }}-${{ runner.arch }}.tar.gz" >> $GITHUB_ENV
    - name: Check for existing artifact
      run: |
        TAG=$(gh release list -R ${{ github.repository }} --limit 1 --json tagName | jq -r '.[0].tagName')
        if gh release download -R ${{ github.repository }} $TAG --pattern "$ASSET_NAME"; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi
      id: check
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - if: steps.check.outputs.exists == 'false'
      uses: actions/setup-go@v6
      with:
        go-version: stable
    - if: steps.check.outputs.exists == 'false'
      run: GOBIN="$PWD/bin" go install ${{ matrix.package.import-path }}@v${{ matrix.package.version }}
    - if: steps.check.outputs.exists == 'false'
      run: tar cvfz $ASSET_NAME -C bin .
    - uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.package.name }}-${{ matrix.package.version }}-${{ matrix.runs-on }}
        path: '*.tar.gz'

  release-create:
    if: github.ref_name == 'main'
    needs: complete
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - id: set-tag
      run: echo "tag=v$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
    - run: gh release -R ${{ github.repository }} create --generate-notes --target ${{ github.sha }} "${{ steps.set-tag.outputs.tag }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      tag: ${{ steps.set-tag.outputs.tag }}

  release-upload:
    if: github.ref_name == 'main'
    needs: release-create
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v8
    - run: gh release -R ${{ github.repository }} upload --clobber "${{ needs.release-create.outputs.tag }}" **/*.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-test:
    if: github.ref_name == 'main'
    needs: [release-create, release-upload]
    permissions:
      contents: read
    strategy:
      matrix:
        runs-on:
        - ubuntu-latest # amd64
        - ubuntu-22.04-arm # arm64
        - macos-15-intel # amd64
        - macos-latest # arm64
        - windows-latest # amd64
    runs-on: ${{ matrix.runs-on }}
    defaults:
      run:
        shell: bash
    steps:
    - uses: actions/checkout@v6
    - uses: ./
      with:
        name: wasm-cs
        version: 1.0.0
        ref: ${{ needs.release-create.outputs.tag }}
    - run: wasm-cs -V
